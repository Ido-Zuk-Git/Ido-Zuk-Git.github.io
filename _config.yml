title: Ido Zuk
description: A mathematical blog.
author: Ido Zuk
url: "https://ido-zuk-git.github.io"

theme: minima
markdown: kramdown

# Leave kramdown's math untouched so MathJax handles all delimiters.
kramdown:
  math_engine: null

plugins:
  - jekyll-feed

# Nav bar: only show the Blog tab (root "/" is the About landing page).
header_pages:
  - blog.md

# Files Jekyll should not copy into the built site.
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor
